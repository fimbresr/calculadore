<style>
:root{--bg:radial-gradient(ellipse at 50% 40%,#1a1f36,#0b0e1a);--cb:rgba(22,28,48,.85);--db:#080b1a;--dt:#f1f5f9;--de:rgba(148,163,184,.7);--bb:linear-gradient(180deg,#2a3a50 0%,#1a2a3e 100%);--bt:#e2e8f0;--nb:linear-gradient(180deg,#2e3f56 0%,#1c2b40 100%);--nt:#eef2ff;--ns:#0f172a;--ob:linear-gradient(180deg,#3d5068 0%,#2a3a50 100%);--ot:#67e8f9;--os:#1a293a;--fb:linear-gradient(180deg,#1e2a3a 0%,#0f1720 100%);--ft:rgba(148,163,184,.8);--fs:#070b12;--cbg:linear-gradient(180deg,#7f1d1d 0%,#4a0e0e 100%);--ct:#fecaca;--cs:#2a0808;--mb:linear-gradient(180deg,#14532d 0%,#0a3a1e 100%);--mt:#86efac;--ms:#052010;--eb:linear-gradient(180deg,#22d3ee 0%,#0891b2 100%);--et:#020617;--es:#065b75}

<body>
<div class="calculator">

<script>
(function(){
const S={
 e:'',d:'0',mem:0,last:0,mode:'DEG',res:false,par:0
};
const $e=document.getElementById('expr'),$r=document.getElementById('res');
function u(){
 $e.textContent=S.e;
 let s=String(S.d);$r.classList.remove('s','xs');
 if(s.length>14)$r.classList.add('xs');else if(s.length>10)$r.classList.add('s');
 $r.textContent=s;
}
function ins(t){
 if(S.res){S.res=false}
 S.e+=t;S.d=S.e;u();
}
function ev(expr){
 try{
  let s=expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-')
   .replace(/π/g,`(${Math.PI})`).replace(/e(?![xp])/g,`(${Math.E})`)
   .replace(/sinh\(/g,'Math.sinh(').replace(/cosh\(/g,'Math.cosh(').replace(/tanh\(/g,'Math.tanh(')
   .replace(/sin⁻¹\(/g,'asin(').replace(/cos⁻¹\(/g,'acos(').replace(/tan⁻¹\(/g,'atan(')
   .replace(/√\(/g,'Math.sqrt(').replace(/∛\(/g,'Math.cbrt(')
   .replace(/²/g,'**2').replace(/³/g,'**3').replace(/⁻¹/g,'**-1')
   .replace(/asin\(/g,'Math.asin(').replace(/acos\(/g,'Math.acos(').replace(/atan\(/g,'Math.atan(')
   .replace(/log₂\(/g,'l2(').replace(/log\(/g,'Math.log10(').replace(/ln\(/g,'Math.log(')
   .replace(/sin\(/g,'sd(').replace(/cos\(/g,'cd(').replace(/tan\(/g,'td(');
  function sd(x){
   if(S.mode==='DEG')return Math.sin(x*Math.PI/180);
   if(S.mode==='GRAD')return Math.sin(x*Math.PI/200);
   return Math.sin(x);
  }
  function cd(x){
   if(S.mode==='DEG')return Math.cos(x*Math.PI/180);
   if(S.mode==='GRAD')return Math.cos(x*Math.PI/200);
   return Math.cos(x);
  }
  function td(x){
   if(S.mode==='DEG')return Math.tan(x*Math.PI/180);
   if(S.mode==='GRAD')return Math.tan(x*Math.PI/200);
   return Math.tan(x);
  }
  function l2(x){return Math.log2(x)}
  function as(x){return Math.asin(x)}
  function ac(x){return Math.acos(x)}
  function at(x){return Math.atan(x)}
  const f=s.replace(/(\d+)!/g,(_,n)=>{let r=1;for(let i=2;i<=+n;i++)r*=i;return r});
  const r=Function('sd','cd','td','as','ac','at','l2','"use strict";return ('+f+')')(sd,cd,td,as,ac,at,l2);
  if(typeof r!=='number'||!isFinite(r))return{error:'Error'};
  return{value:parseFloat(r.toPrecision(12))};
 }catch(e){return{error:'Error'}}
}
function calc(){
 if(!S.e.trim())return;
 const r=ev(S.e.replace(/=/g,''));
 if(r.error){S.d=r.error;S.res=true;u();return}
 const v=parseFloat(r.value.toPrecision(12));
 S.d=String(v);S.last=v;S.res=true;u();
}
const A={
 '0':()=>ins('0'),'1':()=>ins('1'),'2':()=>ins('2'),'3':()=>ins('3'),
 '4':()=>ins('4'),'5':()=>ins('5'),'6':()=>ins('6'),'7':()=>ins('7'),
 '8':()=>ins('8'),'9':()=>ins('9'),'decimal':()=>ins('.'),
 'add':()=>ins('+'),'subtract':()=>ins('−'),'multiply':()=>ins('×'),
 'divide':()=>ins('÷'),'percent':()=>ins('%'),'power':()=>ins('^'),
 'neg':()=>ins('−'),'exp':()=>ins('^'),'ee':()=>ins('E'),
 'lparen':()=>{ins('(');S.par++},
 'rparen':()=>{const openC=(S.e.match(/\(/g)||[]).length;const closeC=(S.e.match(/\)/g)||[]).length;if(openC>closeC){ins(')');if(S.par>0)S.par--}},
 'sqrt':()=>{ins('√(');S.par++},'root3':()=>{ins('∛(');S.par++},'square':()=>ins('²'),
 'cube':()=>ins('³'),'inv':()=>ins('⁻¹'),'fact':()=>ins('!'),
 'sin':()=>{ins('sin(');S.par++},'cos':()=>{ins('cos(');S.par++},'tan':()=>{ins('tan(');S.par++},
 'asin':()=>{ins('sin⁻¹(');S.par++},'acos':()=>{ins('cos⁻¹(');S.par++},'atan':()=>{ins('tan⁻¹(');S.par++},
 'sinh':()=>{ins('sinh(');S.par++},'cosh':()=>{ins('cosh(');S.par++},'tanh':()=>{ins('tanh(');S.par++},
 'log':()=>{ins('log(');S.par++},'log2':()=>{ins('log₂(');S.par++},'ln':()=>{ins('ln(');S.par++},
 'abs':()=>{ins('Math.abs(');S.par++},'pow10':()=>ins('10^'),
 'pi':()=>ins('π'),'euler':()=>ins('e'),
 'mc':()=>{S.mem=0},'mr':()=>{if(S.mem!==0||String(S.mem)==='0')ins(String(S.mem))},
 'mplus':()=>{const v=parseFloat(S.d);if(!isNaN(v))S.mem+=v},
 'mminus':()=>{const v=parseFloat(S.d);if(!isNaN(v))S.mem-=v},
 'ans':()=>{if(S.last!==0||String(S.last)==='0')ins(String(S.last))},
 'rand':()=>{const r=Math.random();S.d=String(r);S.e+=String(r);u()},
 'deg':()=>{
  S.mode=S.mode==='DEG'?'RAD':S.mode==='RAD'?'GRAD':'DEG';
  S.e+=`[${S.mode}]`;u();
  setTimeout(()=>{S.e=S.e.replace(`[${S.mode}]`,'');u()},1200);
 },
 'clear':()=>{S.e='';S.d='0';S.res=false;S.par=0;u()},
 'del':()=>{
  if(S.res){S.e='';S.d='0';S.res=false}
  else{S.e=S.e.slice(0,-1);S.d=S.e||'0'}
  u();
 },
 'equals':()=>{
  while(S.par>0){S.e+=')';S.par--}
  S.e=S.e.replace(/[+\-×÷^]$/,'');
  calc();
 },
 'mode':()=>{S.e+='[MODE]';u();setTimeout(()=>{S.e=S.e.replace('[MODE]','');u()},800)},
 'reset':()=>{S.e='';S.d='0';S.mem=0;S.last=0;S.res=false;S.par=0;u()},
 'alpha':()=>{S.e+='[α]';u();setTimeout(()=>{S.e=S.e.replace('[α]','');u()},800)},
 'hyp':()=>{S.e+='[HYP]';u();setTimeout(()=>{S.e=S.e.replace('[HYP]','');u()},800)},
 'setup':()=>{S.e+='[SETUP]';u();setTimeout(()=>{S.e=S.e.replace('[SETUP]','');u()},800)}
};
document.addEventListener('keydown',e=>{
 const k=e.key,m={'Enter':'equals','=':'equals','Backspace':'del','Delete':'clear',
  'Escape':'clear','(':'lparen',')':'rparen','.':'decimal','%':'percent',
  '+':'add','-':'subtract','*':'multiply','/':'divide','^':'power'};
 const a=m[k];
 if(a&&A[a]){e.preventDefault();A[a]()}
 if(k==='p'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();A.pi()}
});
document.querySelectorAll('#btns button').forEach(b=>{
 b.addEventListener('click',()=>{const a=b.dataset.a;if(a&&A[a])A[a]()});
});
u();
// Service Worker registration for offline use
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// Theme toggle
const tb=document.getElementById("themeBtn");
function t(){
  document.body.classList.toggle("light");
  const isL=document.body.classList.contains("light");
  localStorage.setItem("ct",isL?"l":"d");
  tb.textContent=isL?"🌙":"☀️";
}
if(localStorage.getItem("ct")==="l"){document.body.classList.add("light");tb.textContent="🌙";}

})();
</script>
